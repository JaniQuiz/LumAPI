name: Build with PyInstaller (Manual only)

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    name: Build Windows (amd64)
    runs-on: windows-latest
    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Prepare Config and Init Files
        run: |
          mkdir -p lumapi
          echo "{}" > lumapi/config.json

      - name: Build GUI
        run: |
          pyinstaller --noconsole --onefile --clean \
            --name LumAPI_GUI-windows-amd64.exe \
            --hidden-import numpy \
            --exclude-module matplotlib \
            --add-data "lumapi;lumapi" \
            LumAPI_GUI.py

      - name: Build CLI
        run: |
          pyinstaller --onefile --clean \
            --name LumAPI_CLI-windows-amd64.exe \
            --hidden-import numpy \
            --exclude-module matplotlib \
            --add-data "lumapi;lumapi" \
            LumAPI_CLI.py

      - name: Upload Windows Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: artifacts-windows
          path: dist/*.exe

  build-linux:
    name: Build Linux (${{ matrix.arch }})
    runs-on: ${{ matrix.runs-on }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runs-on: ubuntu-22.04
          - arch: arm64
            runs-on: ubuntu-22.04-arm
    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Prepare Config and Init Files
        run: |
          mkdir -p lumapi
          echo "{}" > lumapi/config.json

      - name: Build GUI
        run: |
          pyinstaller --noconsole --onefile --clean \
            --name LumAPI_GUI-linux-${{ matrix.arch }} \
            --hidden-import numpy \
            --exclude-module matplotlib \
            --add-data "lumapi:lumapi" \
            LumAPI_GUI.py

      - name: Build CLI
        run: |
          pyinstaller --onefile --clean \
            --name LumAPI_CLI-linux-${{ matrix.arch }} \
            --hidden-import numpy \
            --exclude-module matplotlib \
            --add-data "lumapi:lumapi" \
            LumAPI_CLI.py

      - name: Package executables
        run: |
          cd dist
          tar -czvf ../LumAPI_GUI-linux-${{ matrix.arch }}.tar.gz LumAPI_GUI-linux-${{ matrix.arch }}
          tar -czvf ../LumAPI_CLI-linux-${{ matrix.arch }}.tar.gz LumAPI_CLI-linux-${{ matrix.arch }}

      - name: Upload Linux Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: artifacts-linux-${{ matrix.arch }}
          path: '*.tar.gz'